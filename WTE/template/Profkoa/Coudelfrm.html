<!DOCTYPE html>
<html lang=ja>

<head>
  <meta charset=utf-8>
  <meta content="IE=edge" http-equiv=X-UA-Compatible>
  <meta content="width=device-width,initial-scale=1" name=viewport>
  <title>授業削除｜<TMPL_INCLUDE NAME="../include/title.html"></title>
  <meta name="description" content="" />
  <meta name="keywords" content="オンライン英会話,スカイプ英会話,日本人講師,日本語対応可,日本語OK,初心者向け,マンツーマン,World Talk,ワールドトーク,桐原書店,TOEIC,英検" />
  <meta name="robots" content="noindex,nofollow" />
  <TMPL_INCLUDE NAME="../include/head.html">
</head>


<body id="instructor" class="instructor">
  <TMPL_INCLUDE NAME="../include/body.html">
    <TMPL_INCLUDE NAME="../include/header_prof.html">

      <main role="main" class="wt_main">
        <section class="wt_sec_bg_1">
          <div class="container">
            <div class="row">
              <div class="col-12 col-md-8 offset-md-2">
                <h2 class="text-center">授業削除</h2>
                
            </div>
          </div>
          <div class="row">
            <div class="col-xs-12 col-md-8 offset-md-2">
              <p class="text-center">授業データを削除します。内容を確認の上、「削除」ボタンを押してください。</p>

              <form method="post" action="%CGI_URL%" enctype="multipart/form-data" class="wform">
                <input type="hidden" name="m" value="coudelset" />
                <input type="hidden" name="pkey" value="%pkey%" />
                <TMPL_IF NAME="errs">
                  <div class="errs">%errs%</div>
                </TMPL_IF>

                <div class="form-group">
                  <label>授業名</label>
                  <p>%course_name%</p>
                </div>

                <div class="form-group">
                  <label>キャッチコピー</label>
                  <p>%course_copy%</p>
                </div>

                <div class="form-group">
                  <label>必要チケット</label>
                  <p>%course_fee_with_comma%回</p>
                </div>

                <div class="form-group">
                  <label>アイキャッチ写真</label>
                  <TMPL_IF NAME="course_logo">
                    <div id="course_logo_box">
                      <img src="%course_logo_1_url%?%epoch%" width="%course_logo_1_w%" height="%course_logo_1_h%"
                        alt="小">
                      <img src="%course_logo_2_url%?%epoch%" width="%course_logo_2_w%" height="%course_logo_2_h%"
                        alt="中">
                      <img src="%course_logo_3_url%?%epoch%" width="%course_logo_3_w%" height="%course_logo_3_h%"
                        alt="大">
                    </div>
                  </TMPL_IF>
                </div>

                <div class="form-group">
                  <label >大カテゴリー</label>
                  <p>%ccate_name_1%</p>
                </div>

                <div class="form-group">
                  <label>小カテゴリー</label>
                  <p>%ccate_name_2%</p>
                </div>

                <div class="form-group">
                  <label>レッスンの単位時間（分）</label>
                  <p>%course_step% 分</p>
                </div>

                <div class="form-group">
                  <label>内容詳細</label>
                  <div>%course_intro%</div>
                </div>

                <div class="form-group">
                  <label>Youtube ID</label>
                  <p>https://www.youtube.com/watch?v=%course_youtube_id%</p>
                </div>

                <div class="form-group">
                  <label>ステータス</label>
                  <p>
                  <TMPL_IF NAME="course_status_0">無効</TMPL_IF>
                  <TMPL_IF NAME="course_status_1">有効</TMPL_IF>
                  </p>
                </div>

                <div class="text-center"><input type="submit" value="削除する" name="setBtn" class="btn btn-danger rounded-pill wt_btn" />
                </div>
              </form>

            </div>
          </div>
        </div>
      </section>
     </main>  
        
    <!-- foot section -->
<TMPL_INCLUDE NAME="../include/footer_prof.html">
  </div>
<TMPL_INCLUDE NAME="../include/foot_prof.html">

      <!-- フォーム二重投稿禁止 -->
      <script src="%static_url%/js/form-guard.js"></script>

</body>

</html>
