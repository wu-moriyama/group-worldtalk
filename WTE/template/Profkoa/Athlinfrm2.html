<!DOCTYPE html>
<html lang=ja>

<head>
  <meta charset=utf-8>
  <meta content="IE=edge" http-equiv=X-UA-Compatible>
  <meta content="width=device-width,initial-scale=1" name=viewport>
  <title>%prof_caption%ログイン｜<TMPL_INCLUDE NAME="../include/title.html"></title>
  <meta name="description" content="" />
  <meta name="keywords" content="オンライン英会話,スカイプ英会話,日本人講師,日本語対応可,日本語OK,初心者向け,マンツーマン,World Talk,ワールドトーク,桐原書店,TOEIC,英検" />
  <meta name="robots" content="noindex,nofollow" />
  <TMPL_INCLUDE NAME="../include/head.html">
  <style>
    section h2 {
    }
    div.errs{
      padding:20px;
      background:#fff2f2;
    }
    .input-group-text{
      font-size:1.6rem;
    }
    .input-group-text span{
      margin: 0 auto;
    }
    .wt_form .form-control {
      margin-bottom:0
    }
    .form-check label{
      font-weight:600;
      font-size:1.5rem;
    }
    .wt_main {
      margin-top: 0;
    }
    .card{
      word-wrap: break-word;
      background-color: #fff;
      background-clip: border-box;
      border: 0 solid rgba(0,0,0,.1);
      border-radius: 1.5rem;
      box-shadow: 0 0 1px rgba(0,0,0,.125), 0 1px 3px rgba(0,0,0,.2);
    }
    .card-header{
      background-color: transparent;
      border-bottom:none;
      padding:2em 2em 1em 2em;
    }
    .card-header h3{
      margin:0;
      font-size: 22px;
      font-size: 2.2rem;
    }
    .card-body{
      background-color: transparent;
      border-bottom:none;
      padding:.5em 1.5em 0.5em 1.5em;
    }
    .card-footer{
      background-color: transparent;
      border-top:none;
      padding: 1em 2em 2em 2em;
    }
    .card-footer .wt_btn{
      margin:0;
    }
    .login-card-body .input-group .form-control{
      border-right: 0;
    }
    .login-card-body .input-group .input-group-text{
      border-left: 0;
      background-color: transparent;
      color:#00ada9;
      width: 50px;
      text-align: center;
    }
    .bg-symbol-animals{
      position: relative;
    }
    .bg-symbol-animals::after{
      background:url("/assets/img/common/symbol-animals.png") no-repeat center bottom;
      background-size:contain;
      position: absolute;
      content: "";
      width: 90px;
      height: 82px;
      top: -80px;
      right: 0;
    }
    #view{
      cursor: pointer;
      transition: all 200ms ease-out;
    -webkit-transition: all 200ms ease-out;
    }
    #view:hover{
      opacity:.6;
    }
    @media (min-width: 768px){
      
      .card-header h3 {
          font-size: 26px;
          font-size: 2.6rem;
      }
      .card-body{
        padding:.5em 2em 0.5em 2em;
      }
      .w-md-45{
        width:45%!important;
      }
      .bg-symbol-animals::after{
        width: 120px;
        height: 82px;
        top: -80px;
        right: 0;
      }
    }
  </style>
</head>

<body id="instructor" class="instructor" style="background:#eef3f7;">
  <TMPL_INCLUDE NAME="../include/body.html">

      <main role="main" class="wt_main">
        <section class="">
          <div class="container">
            <div class="row">
              <div class="col-12 col-md-8 offset-md-2 col-lg-6 offset-lg-3">
                <p class="text-center"><img src="/assets/img/common/logo.svg" alt="KIRIHARA Online Academy" class="w-50 w-md-45 mb-3 mb-md-5"></p>
                
                
            
                <div class="wt_form card bg-symbol-animals">
                  <form action="%CGI_URL%" method="post">
                  <input type="hidden" name="m" value="athlinsmt" />
                  <div class="card-header">
                    <h3 class="text-center">%prof_caption%ページログイン</h3>
                  </div>
                  <div class="card-body login-card-body">
                    <p class="text-center">登録したアドレスとパスワードで入室ください</p>
                      <TMPL_IF NAME="errs"><div class="errs">%errs%</div></TMPL_IF>
                      <div class="form-group mb-4">
                        <div class="input-group">
                          <input type="text" id="prof_email" name="prof_email" value="%prof_email%" class="form-control inputlimit_ascii %prof_email_err%" placeholder="メールアドレスをご入力ください" />
                          <div class="input-group-append">
                            <div class="input-group-text">
                              <span class="fas fa-envelope"></span>
                            </div>
                          </div>
                        </div>
                      </div>

                      <div class="form-group">
                        <div class="input-group">
                          <input type="password" id="prof_pass" name="prof_pass" value="%prof_pass%" class="form-control %prof_pass_err%" placeholder="パスワードをご入力ください" />
                          <div class="input-group-append">
                            <div class="input-group-text" id="view">
                              <span class="fas fa-eye-slash"></span>
                            </div>
                          </div>
                        </div>
                      </div>

                      <fieldset class="form-group mb-0">
                        <div class="form-check">
                          <label for="auto_login_enable"><input type="checkbox" id="auto_login_enable" name="auto_login_enable" value="1" %auto_login_enable_1_checked% />次回から自動でログイン</label>
                        </div>
                      </fieldset>
                    </div>
                    <div class="card-footer">
                      <div class="text-center"><input type="submit" value="ログイン" class="btn btn-primary rounded-pill wt_btn" /></div>
                    </div>
                    </form>
                </div>
            

              </div>
            </div>
          </div>
        </section>
      </main>

    <!-- foot section -->
<TMPL_INCLUDE NAME="../include/footer_prof.html">
  </div>
<TMPL_INCLUDE NAME="../include/foot_prof.html">
<script>
  //  id="view"を取得
let viewicon = document.getElementById('view');

//  id="password"を取得
let inputtype = document.getElementById('prof_pass');

//  id="view"クリック時の処理を設定
$('#view').on('click', function () {

       //  passwordからtextへ
       if(inputtype.type === 'password'){
              inputtype.type = 'text';
              viewicon.innerHTML = '<span class="fas fa-eye"></span>';

        //  textからpasswordへ
        } else {
               inputtype.type = 'password';
               viewicon.innerHTML = '<span class="fas fa-eye-slash"></span>';
        }
});
</script>
</body>
</html>
