<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta content="IE=edge" http-equiv="X-UA-Compatible">
<title>%prof_caption%用メモ - %product_name%</title>
<TMPL_INCLUDE NAME="../include/head_prof.html">
</head>
<body id="instructor">

  <TMPL_INCLUDE NAME="../include/header_prof.html">
    <div id="sb-site" class="bg-light">

    <!-- schedule section -->
    <section>
      <div class="container">
        <div class="row">
          <div class="col-12">
            <div class="card mb-5">
              <form method="post" action="%CGI_URL%">
                <input type="hidden" name="m" value="ntemodset" />
                <input type="hidden" name="pkey" value="%pkey%" />
                <div class="card-header">
                  <div class="text-center"><img src="/assets/img/icons/sticky-note.png" alt="メモ帳" class="wte_img_icons"></div>
                  <h3 class="text-center">メモ帳</h3>
                </div>
                <div class="card-body">
                  <p>自分用のメモにご利用ください。こちらに記載した内容はダッシュボードに表示されます。</p>
                    <TMPL_IF NAME="errs"><div class="errs">%errs%</div></TMPL_IF>

                    <div class="form-group">
                      <label for="prof_note">メモを書き込む</label>
                      <textarea id="prof_note" name="prof_note" class="form-control">%prof_note%</textarea>
                      <ul class="note">
                        <li>1000文字以内</li>
                      </ul>
                    </div>
                </div>
                <div class="card-footer">
                  <div class="text-center"><input type="submit" value="&raquo; メモを登録する" class="btn btn-success rounded-pill"></div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- foot section -->
<TMPL_INCLUDE NAME="../include/footer_prof.html">
  </div>
<TMPL_INCLUDE NAME="../include/foot_prof.html">
  
</body>
</html>
