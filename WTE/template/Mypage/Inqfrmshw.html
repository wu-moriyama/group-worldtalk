<!DOCTYPE html>
<html lang=ja>
<head>
<meta charset=utf-8>
<meta content="IE=edge" http-equiv=X-UA-Compatible>
<title>お問い合わせ - <TMPL_INCLUDE NAME="../include/title.html"></title>
  <TMPL_INCLUDE NAME="../include/head.html">
  </head>
  <body id="user" class="<TMPL_INCLUDE NAME="../include/body_class.html">">
  
    <TMPL_INCLUDE NAME="../include/header.html">
      <div id="sb-site" class="bg-light">
  
        <!-- schedule section -->
        <section>
          <div class="container">
            <div class="row">
              <div class="col-12 col-md-10 offset-md-1 col-lg-8 offset-lg-2">
  
                <div class="card mb-5">
                    <form method="post" action="%CGI_URL%">
                      <input type="hidden" name="m" value="inqcfmset" />
                      <input type="hidden" name="pkey" value="%pkey%" />
                      <input type="hidden" name="inq_title_caption_1" value="レッスンリクエスト" />
                      <input type="hidden" name="inq_title_caption_2" value="体験の方法について" />
                      <input type="hidden" name="inq_title_caption_3" value="お支払について" />
                      <input type="hidden" name="inq_title_caption_4" value="通話システムについて" />
                      <input type="hidden" name="inq_title_caption_5" value="レッスン報告について" />
                      <input type="hidden" name="inq_title_caption_6" value="その他のご質問" />
                      <div class="card-header">
                        <div class="text-center"><img src="/assets/img/icons/chat.png" alt="お問い合わせ" class="wte_img_icons"></div>
                        <h3 class="text-center">お問い合わせ</h3>
                      </div>
                      <div class="card-body">
                        <div class="alert alert-muted">
                          <div class="row">
                            <div class="col-2 col-md-1 d-flex justify-content-center align-items-center">
                              <img src="/assets/img/icons/idea.png" alt="hint" class="w-75 h-auto">
                            </div>
                            <div class="col-10 col-md-11">
                              <p class="mb-0">よくある質問をお問い合わせ前にご一読ください</p>
                            </div>
                          </div>
                        </div>

                        <div class="row mb-5">
                          <div class="col-4 col-md-15 mb-3 mb-md-0">
                            <a href="%ssl_host_url%/WTE/mypage.cgi?m=faq#faq_trial_m" class="btn btn-white btn-sq">
                              <i class="fas fa-chalkboard-teacher text-primary big pt-2 mb-2"></i>
                              <br>体験について
                            </a>
                          </div>
                          <div class="col-4 col-md-15 mb-3 mb-md-0">
                            <a href="%ssl_host_url%/WTE/mypage.cgi?m=faq#faq_account_m" class="btn btn-white btn-sq">
                              <i class="fas fa-id-card-clip text-primary big pt-2 mb-2"></i>
                              <br>アカウントについて</a>
                          </div>
                          <div class="col-4 col-md-15 mb-3 mb-md-0">
                            <a href="%ssl_host_url%/WTE/mypage.cgi?m=faq#faq_plan_m" class="btn btn-white btn-sq">
                              <i class="fas fa-credit-card text-primary big pt-2 mb-2"></i>
                              <br>料金について</a>
                          </div>
                          <div class="col-4 offset-2 col-md-15 offset-md-0">
                            <a href="%ssl_host_url%/WTE/mypage.cgi?m=faq#faq_call_m" class="btn btn-white btn-sq">
                              <i class="fas fa-video text-primary big pt-2 mb-2"></i>
                              <br>通話システム</a>
                          </div>
                          <div class="col-4 col-md-15">
                            <a href="%ssl_host_url%/WTE/mypage.cgi?m=faq#faq_other_m" class="btn btn-white btn-sq">
                              <i class="fas fa-ellipsis-h text-primary big pt-2 mb-2"></i>
                              <br>その他ご質問</a>
                          </div>
                        </div>


                        <div class="alert alert-muted mb-5">
                          <div class="row">
                            <div class="col-2 col-md-1 d-flex justify-content-center align-items-center">
                              <img src="/assets/img/icons/idea.png" alt="hint" class="w-75 h-auto">
                            </div>
                            <div class="col-10 col-md-11">
                              <p class="mb-0">解決しなかった方はフォームよりお問い合わせください</p>
                            </div>
                          </div>
                        </div>
            
                        <TMPL_IF NAME="errs"><div class="errs">%errs%</div></TMPL_IF>
               
                        <div class="form-group d-none">
                          <label>ニックネーム</label>
                          <p>%member_handle% 様</p>
                        </div>
                        
                        <div class="form-group">
                          <label>通知メールアドレス</label>
                          <p class="mb-0">%member_email%</p>
                        </div>
               
                        <div class="form-group">
                          <label for="inq_cont" class="required %inq_title_err%">お問い合わせ項目</label>
                          <select class="form-control %inq_title_err% form-select" id="inq_title" name="inq_title">
                            <option value="">---お問い合わせ項目をお選び下さい---</option>
                            <option value="1" %inq_title_selected_1%>レッスンリクエスト</option>
                            <option value="2" %inq_title_selected_2%>体験の方法について</option>
                            <option value="3" %inq_title_selected_3%>お支払について</option>
                            <option value="4" %inq_title_selected_4%>通話システムについて</option>
                            <option value="5" %inq_title_selected_5%>レッスン報告について</option>
                            <option value="6" %inq_title_selected_6%>その他のご質問</option>
                          </select>
                        </div>

                        <div class="form-group">
                          <label for="inq_cont" class="required %inq_cont_err%">お問い合わせ内容</label>
                          <textarea id="inq_cont" name="inq_cont" class="form-control %inq_cont_err%" placeholder="お問い合わせ内容をご記入下さい">%inq_cont%</textarea>
                          <ul class="note">
                            <li>お問い合わせ内容は<span id="inq_cont_max_char_num">3000</span>文字以内で入力してください。（現在の入力文字数：<span id="inq_cont_char_num">0</span>文字）</li>
                          </ul>
                        </div>
                      </div>
               
                      <div class="card-footer">
                        <div class="text-center"><input type="submit" value="&raquo; 確認フォームへ" name="setBtn" class="btn btn-primary rounded-pill" /></div>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </section>

    <!-- foot section -->
<TMPL_INCLUDE NAME="../include/footer.html">
  </div>
<TMPL_INCLUDE NAME="../include/foot.html">
<TMPL_INCLUDE NAME="../include/analysis.html">
  <script src="%static_url%/js/dom.js"></script>
  <script src="%static_url%/js/form.js"></script>
  <script src="%static_url%/js/inputlimit.js"></script>
  <script src="%static_url%/js/mypage/inqfrmshw.js"></script>
</body>
</html>
