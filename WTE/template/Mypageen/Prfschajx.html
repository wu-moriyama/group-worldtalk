<style>
.wte_calendar tr th span {
    white-space: nowrap;
    font-size: 12px;
}    
</style>    


        <div class="row">
          <nav aria-label="..." class="text-center">
            <ul class="pagination">
                <TMPL_IF NAME="last_month_disabled">
                  <li class="page-item disabled"><span class="page-link"> &laquo; %last_month_Y%/%last_month_n%</span></li>
                <TMPL_ELSE>
                  <li class="page-item"><a href="%CGI_URL%?m=prfschajx&amp;prof_id=%prof_id%&amp;ym=%last_month_Y%%last_month_m%" id="last_month_link" class="page-link"> &laquo; %last_month_Y%/%last_month_n%</a></li>
                </TMPL_IF>
                
              <li class="page-item active">
                <span class="page-link"> %this_month_Y%/%this_month_n% </span>
              </li>
                <TMPL_IF NAME="next_month_disabled">
                  <li class="page-item disabled"><span class="page-link"> %next_month_Y%/%next_month_n% &raquo; </span></li>
                <TMPL_ELSE>
                  <li class="page-item"><a href="%CGI_URL%?m=prfschajx&amp;prof_id=%prof_id%&amp;ym=%next_month_Y%%next_month_m%" id="next_month_link" class="page-link"> %next_month_Y%/%next_month_n% &raquo; </a></li>
                </TMPL_IF>
            </ul>
          </nav>
        </div>
        <div class="row">
          <div class="col-12">
            <div class="table-responsive">
            
            <table class="wte_calendar">
             <thead>
              <tr>
                <th class="sun"><span>Sun</span></th>
                <th><span>Mon</span></th>
                <th><span>Tue</span></th>
                <th><span>Wed</span></th>
                <th><span>Thu</span></th>
                <th><span>Fri</span></th>
                <th class="sat"><span>Sat</span></th>
              </tr>
              </thead>
              <tbody>
              <TMPL_LOOP NAME="week_loop">
              <tr>
                <TMPL_LOOP NAME="day_loop">
                <td class="%othermonth% %today%">
                  %j%
                  <TMPL_IF NAME="sch_num">
                  <ul>
                    <TMPL_LOOP NAME="sch_loop">
                      <TMPL_IF NAME="disabled">
                        <li class="finished"><span>%stime% Finished</span></li>
                      <TMPL_ELSE>
                        <TMPL_IF NAME="lsn_id">
                          <li class="reserved"><span>%stime% Reserved</span></li>
                        <TMPL_ELSE>
                          <li class="vacant"><a href="%CGI_URL%?m=lsnrsvcfm&amp;sch_id=%sch_id%">%stime% Vacant</a></li>
                        </TMPL_IF>
                      </TMPL_IF>
                    </TMPL_LOOP>
                  </ul>
                  </TMPL_IF>
                </td>
                </TMPL_LOOP>
              </tr>
              </TMPL_LOOP>
              </tbody>
            </table>
          </div>
          </div>
        </div>
