<!DOCTYPE html>
<html lang=ja>
<head>
<meta charset=utf-8>
<meta content="IE=edge" http-equiv=X-UA-Compatible>
<meta content="width=device-width,initial-scale=1" name=viewport>
<title>Edit Notes - <TMPL_INCLUDE NAME="../include/title.html"></title>
<TMPL_INCLUDE NAME="../include/head.html">        
</head>
<body id="user" class="<TMPL_INCLUDE NAME="../include/body_class.html">">

<TMPL_INCLUDE NAME="../include/headeren.html">
    <div id="sb-site" class="bg-light">

    <!-- content section -->
    <section>
      <div class="container">
        <div class="row">
          <div class="col-12 col-md-10 offset-md-1">
            <div class="card mb-5">
                
            <form method="post" action="%CGI_URL%">
              <input type="hidden" name="m" value="ntemodset" />
              <input type="hidden" name="pkey" value="%pkey%" />
  
                <div class="card-header">
                  <div class="text-center"><img src="/assets/img/icons/sticky-note.png" alt="メモ帳" class="wte_img_icons"></div>
                  <h3 class="text-center">Edit Notes</h3>
                </div>  
                <div class="card-body">
                    <p>Please use it for your own notes. This information will be displayed on your dashboard.</p>
                    <TMPL_IF NAME="errs"><div class="errs">%errs%</div></TMPL_IF>
                    <div class="form-group">
                      <label for="prof_note">Edit Notes</label>
                        <textarea id="member_note" name="member_note" class="form-control">%member_note%</textarea>
                      <ul class="note">
                        <li>1000 characters or less</li>
                      </ul>
                    </div>
                </div>
                <div class="card-footer">              
                  <div class="text-center"><input type="submit" value="&raquo; Edit" name="setBtn" class="btn btn-primary rounded-pill" /></div>                    
                </div>
                
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>        
        

    <!-- foot section -->
<TMPL_INCLUDE NAME="../include/footeren.html">
  </div>
<TMPL_INCLUDE NAME="../include/foot.html">
</body>
</html>
