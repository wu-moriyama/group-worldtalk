<!DOCTYPE html>
<html lang=ja>
<head>
<meta charset=utf-8>
<meta content="IE=edge" http-equiv=X-UA-Compatible>
<meta content="width=device-width,initial-scale=1" name=viewport>
<title>Sign Up</title>
<meta name="description" content="" />
<meta name="keywords" content="%product_name%" />
<TMPL_INCLUDE NAME="../include/head.html">
</head>
<body id="user">

<TMPL_INCLUDE NAME="../include/header.html">
  <div id="sb-site">

    <!-- content section -->
    <section class="page bggrey">
      <div class="container">
        <div class="row">
          <div class="col-12 col-lg-8 offset-lg-2">
            
            <h1>Sign Up</h1>
            <p class="text-center">Please confirm your details then click "send".</p>
              
              <form method="post" action="%CGI_URL%" class="wform">
                <div class="progresscont">
                  <div class="progresstxt">
                    <div class="row">
                      <div class="col-3 text-center">
                        Input
                        <div class="progressnum on">1</div>
                      </div>
                      <div class="col-3 text-center">
                        Confirm
                        <div class="progressnum on">2</div>
                      </div>
                      <div class="col-3 text-center">
                        Check Email
                        <div class="progressnum off">3</div>
                      </div>
                      <div class="col-3 text-center">
                        Complete
                        <div class="progressnum off">4</div>
                      </div>
                    </div>
                  </div>
                  <div class="progress">
                    <div class="progress-bar" role="progressbar" style="width:50%" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100"></div>
                  </div>
                </div>
                <input type="hidden" name="m" value="cptset" />
                <input type="hidden" name="pkey" value="%pkey%" />
                <TMPL_IF NAME="errs"><div class="errs">%errs%</div></TMPL_IF>
                <table class="table">
                  <tbody>
                    <tr>
                      <th>Name</th>
                      <td>%member_lastname% %member_firstname%</td>
                    </tr>
                    <tr>
                      <th>Nickname</th>
                      <td>%member_handle%</td>
                    </tr>
                    <tr>
                      <th>Email</th>
                      <td>%member_email%</td>
                    </tr>
                    <tr>
                      <th>Password</th>
                      <td>%member_pass_mask%</td>
                    </tr>
                    <tr style="display:none;">
                      <th>%coupon_code_caption%</th>
                      <td>
                      <TMPL_IF NAME="coupon_price">
                      %coupon_price_with_comma% Points
                      <TMPL_ELSE>
                      -
                      </TMPL_IF>
                      </td>
                    </tr>
                  </tbody>
                </table>
                <div class="text-center">
                  <input type="submit" value="Send" name="setBtn" class="btn btn-primary" />
                </div>
                <div class="text-center">
                  <input type="button" value="&laquo; Edit details" name="backBtn" class="btn btn-link" onclick="javascript:document.location.href='%CGI_URL%?m=frmshw&amp;pkey=%pkey%'" />
                </div>
              </form>
          </div>
        </div>
      </div>
    </section>

    <!-- foot section -->
<TMPL_INCLUDE NAME="../include/footeren.html">
  </div>
<TMPL_INCLUDE NAME="../include/foot.html">
<TMPL_INCLUDE NAME="../include/analysis.html">
</body>
</html>
