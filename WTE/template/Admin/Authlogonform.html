<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>システム管理者画面｜%product_name%</title>
  <TMPL_INCLUDE NAME="include_head.html">
</head>
<body class="hold-transition login-page">
  <div class="login-box">
    <div class="login-logo mb-2">
      <a href="%ssl_host_url%" class="brand-link">
        <img src="%ssl_host_url%/assets/img/common/logo_light.png" class="w-50 h-auto">
      </a>
    </div>
    <div class="card">
    <div class="card-body login-card-body">
      <p class="login-box-msg text-sm">ログインしてください</p>

      <TMPL_IF NAME="errs">
        <div class="errs text-danger text-sm text-center mb-4 text-bold">
          %errs%
        </div>
      </TMPL_IF>
      

    <form action="%CGI_URL%" method="post" target="_top">
      <input type="hidden" name="m" value="authlogon">
      <div class="input-group mb-3 has-feedback %admin_email_has_error%">
            <input type="text" id="id" name="id" value="%id%" size="20" class="form-control" placeholder="ログインID">
            <div class="input-group-append">
            <div class="input-group-text">
            <span class="fas fa-lock form-control-feedback" style="line-height: inherit;"></span>
          </div>
          </div>
          </div>
          <div class="input-group mb-3 has-feedback %admin_pass_has_error%">
            <input type="password" id="pass" name="pass" value="" size="20" class="form-control" placeholder="パスワード">
            <div class="input-group-append">
              <div class="input-group-text" id="view">
              <span class="fas fa-eye-slash form-control-feedback" style="line-height: inherit;"></span>
            </div>
          </div>
          </div>
          <div class="form-group text-sm">
            <input type="checkbox" id="auto_logon_enable" name="auto_logon_enable" value="1" class="checkbox" checked>
            <label for="auto_logon_enable">次回から自動でログインする。</label>
          </div>
          <div class="form-group">
        <input type="submit" name="setBtn" value="ログイン" class="btn btn-info btn-block " />
        </div>
    </form>
  </div>
  </div>
  </div>

  <!-- フォーム二重投稿禁止 -->
  <script src="%static_url%/js/form-guard.js"></script>
  <!-- 入力値半角変換 -->
  <script src="%static_url%/js/input-limit.js"></script>

  <TMPL_INCLUDE NAME="include_foot.html">
    <script>
      //  id="view"を取得
    let viewicon = document.getElementById('view');
    
    //  id="password"を取得
    let inputtype = document.getElementById('pass');
    
    //  id="view"クリック時の処理を設定
    $('#view').on('click', function () {
    
           //  passwordからtextへ
           if(inputtype.type === 'password'){
                  inputtype.type = 'text';
                  viewicon.innerHTML = '<span class="fas fa-eye form-control-feedback" style="line-height: inherit;"></span>';
    
            //  textからpasswordへ
            } else {
                   inputtype.type = 'password';
                   viewicon.innerHTML = '<span class="fas fa-eye-slash form-control-feedback" style="line-height: inherit;"></span>';
            }
    });
  
    </script>
</body>

</html>
