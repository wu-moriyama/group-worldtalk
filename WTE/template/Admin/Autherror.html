      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Noto Sans JP", "Yu Gothic", YuGothic, "ヒラギノ角ゴ Pro W3", "Hiragino Kaku Gothic Pro", メイリオ, Meiryo, Verdana, "ＭＳ Ｐゴシック", sans-serif;

    /*[class*=sidebar-dark-]{
      background-color: #37c3c0;

    [class*=sidebar-dark-] .nav-header {
      color: #fff;
    }

    [class*=sidebar-dark-] .sidebar {

    }
    .content-header h1 {
      font-size: 1.4rem;
      font-weight: 600;

    }
    .breadcrumb-item {

    .form-control {

    .nav-link {

    }

    [class*=sidebar-dark-] .sidebar a {

    .brand-link {

    }

      color: #37c3c0 !important;

    .card-primary:not(.card-outline)>.card-header {

    }

    }

      border-top: 5px solid #37c3c0;
    }


    .card-header {
      border-bottom: none;
    }

    .page-item.active .page-link {

      color: #fff;
      background-color: #37c3c0;
      border-color: #37c3c0;
    }

      color: #888888;
    }

    }

    i.status_1 {
      color: #42c942;
    }

      background-color: #eeeeee;
    }

    tr.success_2 {

    tr.success_3 {

    i.success_0 {
      color: #888888;
    }

    i.success_1 {
      color: #42c942;
    }

    i.success_2 {

    }

    i.success_3 {
      color: #ffb656;
    }

      background-color: #2e2e33;
    }

    }

        background-color: #f4fafd;
    }
    
    .content-wrapper{
        background-color: #f4f6f9;
    }

      top: 0;
      background: #fff;
    }
    .errs ::marker{
      content: "*";

    .errs ul {
      padding-left: 1rem;
    }
      
    @media (min-width: 768px) {
      .w-md-25 {
         width:25% !important;
    }
}
    .required::after {
        content: " *";
        color: #e05050;
    } 
    .seller_switch{
    }
    .seller_switch_on{
      display:none;
    }
    .displaynone{
      display:none;
    } 
    .wt_table_sticky {
        position: sticky !important;
        top: 0;
        background: #fff;
        align-items: flex-start;

<body class="hold-transition login-page">
        
    <div class="login-box">
      <div class="login-logo mb-2">

        <img src="https://www.remote.wte.jp/assets/img/common/logo_light.png" class="w-50 h-auto">
        </a>
      </div>
      <div class="card">
        <div class="card-body login-card-body">
          <p class="login-box-msg text-sm">ログインしてください</p>

          <div class="text-center text-sm"><a href="%CGI_URL%?m=authlogonform" class="btn btn-info">ログオンしなおす</a></div>
        </div>
      </div>
    </div>
