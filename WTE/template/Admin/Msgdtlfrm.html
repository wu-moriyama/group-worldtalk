<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="ja" lang="ja">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta http-equiv="Content-Language" content="ja" />
<meta http-equiv="Content-Style-Type" content="text/css" />
<meta http-equiv="Content-Script-Type" content="text/javascript" />
<title>%product_name%</title>
<link href="%static_url%/css/admin/common.css" type="text/css" rel="stylesheet" />
<style type="text/css">
table.detail {
	border-top: 2px solid #888888;
	border-bottom: 2px solid #888888;
	border-collapse: collapse;
}
table.detail th {
	white-space: nowrap;
	text-align: left;
	border-bottom: 1px dotted #888888;
	padding: 0.3em;
	color: #000000;
}
table.detail td {
	border-bottom: 1px dotted #888888;
	padding: 0.3em;
	color: #000000;
}
</style>
</head>
<body>
<h1><a href="%CGI_URL%?m=mbrlstfrm">メッセージ管理</a> - 詳細</h1>
<div id="main">

<p><input type="button" value="戻る" onclick="javascript:history.back();" class="submit" /></p>
<table class="detail">
	<tbody>
		<tr>
			<th><span class="seller_switch">支店（代理店）</span><span class="seller_switch_on">運営者</span></th>
			<td><a href="http://%seller_fqdn%/" target="_blank">%seller_company%</a></td>
		</tr>
		<tr>
			<th>送信日時</th>
			<td>%msg_date% %msg_time%</td>
		</tr>
		<tr>
			<th>送信者</th>
			<td>
				<div>%msg_handle%</div>
				<div><small>実際の送信者：<TMPL_IF NAME="member_id">[%member_id%] %member_handle%<TMPL_ELSE>非会員</TMPL_IF></small></div>
				<div><small>IPアドレス：%msg_ip%</small></div>
			</td>
		</tr>
		<tr>
			<th>宛先クリエイター</th>
			<td>[%creator_id%] %creator_handle%</td>
		</tr>
		<tr>
			<th>タイトル</th>
			<td>%msg_title%</td>
		</tr>
		<tr>
			<th>本文</th>
			<td>%msg_body%</td>
		</tr>
	</tbody>
</table>
<p><input type="button" value="戻る" onclick="javascript:history.back();" class="submit" /></p>

</div>
</body>
</html>
